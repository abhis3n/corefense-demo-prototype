name: Build AGL Image
description: Build agl-image-minimal

inputs:
  CLIENT_ID:
    description: "Client ID for the build"
    required: true
  JOB_ID:
    description: "GitHub Job ID for the build"
    required: true
  REPO_PATH:
    description: "Path to the AGL repository"
    required: true

outputs:
  KERNEL:
    description: "Relative path to the kernel image"
  ROOTFS:
    description: "Relative path to the rootfs image"
    
runs:
  using: "composite"
  steps:
   - name: Setup AGL Build Environment
     shell: bash
     run: |
        if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
          echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
        fi
        mkdir -p $GITHUB_WORKSPACE/AGL/trout && cd $GITHUB_WORKSPACE/AGL/trout
        echo "Cloning AGL repository..."
        repo init -b trout -u https://gerrit.automotivelinux.org/gerrit/AGL/AGL-repo
        repo sync

   - name: Pull meta-corefense layer
     shell: bash
     env:
       BB_ENV_PASSTHROUGH_ADDITIONS: "CLIENT_ID JOB_ID"
       CLIENT_ID: ${{ inputs.CLIENT_ID }}
       JOB_ID: ${{ inputs.JOB_ID }}
       REPO_PATH: ${{ inputs.REPO_PATH }}
     run: |
        cd $GITHUB_WORKSPACE/AGL/trout
        echo "Cloning meta-corefense layer..."
        git clone --branch abhis3n/prototype https://github.com/corefense-security/meta-corefense.git 
        if [ ! -d "$GITHUB_WORKSPACE/demo/AGL/qemux86-64" ]; then
          source ./meta-agl/scripts/aglsetup.sh -m qemux86-64 -b $GITHUB_WORKSPACE/demo/AGL/qemux86-64 agl-all-features agl-selinux
          bitbake-layers add-layer $GITHUB_WORKSPACE/AGL/trout/meta-corefense/AGL/meta-corefense
          ls -l $GITHUB_WORKSPACE/$REPO_PATH
          cat $GITHUB_WORKSPACE/$REPO_PATH/conf.append/AGL/local.conf.append >> $GITHUB_WORKSPACE/demo/AGL/qemux86-64/conf/local.conf
          echo "" >> $GITHUB_WORKSPACE/demo/AGL/qemux86-64/conf/local.conf
        else
          cd $GITHUB_WORKSPACE/demo/AGL/qemux86-64
          source $GITHUB_WORKSPACE/demo/AGL/qemux86-64/agl-init-build-env
        fi
        echo "Building AGL image with meta-corefense layer..." 
        bitbake agl-image-minimal
        echo "AGL build completed. Setting output variables for kernel and rootfs images..."

   - name: Set Output Variables
     shell: bash
     run: |
       KERNEL_PATH=$(find $GITHUB_WORKSPACE/demo/AGL/qemux86-64/tmp/deploy/images/qemux86-64 -name "bzImage" | head -n 1)
       ROOTFS_PATH=$(find $GITHUB_WORKSPACE/demo/AGL/qemux86-64/tmp/deploy/images/qemux86-64 -name "agl-image-minimal-qemux86-64.rootfs.ext4" | head -n 1)
       echo "KERNEL=$KERNEL_PATH" >> $GITHUB_OUTPUT
       echo "ROOTFS=$ROOTFS_PATH" >> $GITHUB_OUTPUT

   - name: Cleanup Yocto Build Artifacts
     shell: bash
     if: always()
     run: |
        echo "Deleting AGL repo artifacts to save space..."
        rm -rf $GITHUB_WORKSPACE/AGL