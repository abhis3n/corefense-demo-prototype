name: Scan AGL Image

on:
  push:
    branches: ['demo/*']
  workflow_dispatch:

jobs:
  build-yocto:
    name: Build & Scan AGL Image
    runs-on: [self-hosted, yocto-demo-runner-1]
  
    steps:
      - name: Checkout AGL Demo branch
        uses: actions/checkout@v4
        with:
          path: corefense-agl-demo
          ref: demo/agl
        
      - uses: ./corefense-agl-demo/.github/actions/install-deps

      - uses: ./corefense-agl-demo/.github/actions/build-agl-image
        id: build-agl
        with:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          JOB_ID: ${{ github.run_id }}
          REPO_PATH: corefense-agl-demo

      - name: Debug Outputs
        run: |
        echo "KERNEL: ${{ steps.build-agl.outputs.KERNEL }}"
        echo "ROOTFS: ${{ steps.build-agl.outputs.ROOTFS }}"
      
      # Boot image in QEMU using a reusable action
      - name: Boot and Scan agl-image-minimal
        uses: corefense-security/corefense-scanner/.github/actions/boot-qemu/agl@abhis3n/updates
        with:
          KERNEL_IMAGE: ${{ steps.build-agl.outputs.KERNEL }}
          ROOTFS_IMAGE: ${{ steps.build-agl.outputs.ROOTFS }}
          TARGET_ARCH: x86_64